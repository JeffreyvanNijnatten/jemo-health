services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    command: sh -c "pip install -r requirements.txt -q && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - APP_PASSWORD=${APP_PASSWORD:-}

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
